<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EGOIST 380</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue-deep:    #07080c;
    --blue-glow:    #1e6aff;
    --blue-light:   #4da3ff;
    --blue-pale:    #8fd3ff;
    --cyan:         #00e5ff;
    --ember:        #ff3d1a;
    --ember-dim:    #b8290f;
    --gold:         #ffd700;
    --founder-col:  #ff2d55;
    --leader-col:   #a855f7;
    --pro-col:      #ffd700;
    --member-col:   #38bdf8;
    --glass-bg:     rgba(12, 12, 16, 0.6);
    --glass-border: rgba(120, 130, 145, 0.22);
    --text:         #ececef;
    --text-dim:     rgba(180, 185, 195, 0.55);
  }

  body { font-family: 'Poppins', sans-serif; background: var(--blue-deep); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  body::before {
    content: ''; position: fixed; inset: 0; z-index: -3;
    background: radial-gradient(ellipse 60% 50% at 15% 10%, rgba(30,106,255,.13), transparent),
      radial-gradient(ellipse 50% 40% at 85% 20%, rgba(0,229,255,.09), transparent),
      radial-gradient(ellipse 55% 45% at 100% 100%, rgba(255,61,26,.14), transparent),
      radial-gradient(ellipse 40% 60% at 50% 90%, rgba(30,106,255,.10), transparent),
      linear-gradient(160deg, #060709 0%, #0c0d11 50%, #050506 100%);
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background-image: linear-gradient(rgba(77,163,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(77,163,255,.04) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  /* claw-mark slashes: jagged diagonal light streaks crossing the page */
  .claw-marks { position: fixed; inset: 0; z-index: -2; pointer-events: none; overflow: hidden; opacity: .55; }
  .claw-marks::before, .claw-marks::after {
    content: ''; position: absolute; width: 200vw; height: 3px; left: -50vw;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,.35) 20%, rgba(255,61,26,.3) 55%, transparent 80%);
    transform: rotate(-22deg);
  }
  .claw-marks::before { top: 18%; }
  .claw-marks::after { top: 64%; height: 2px; transform: rotate(-22deg) scaleX(.85); opacity: .7; }

  /* large rotated wordmark watermark, sits quietly behind all content */
  .watermark { position: fixed; inset: 0; z-index: -2; pointer-events: none; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .watermark span {
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size: clamp(140px, 32vw, 520px);
    letter-spacing: 6px; color: transparent; -webkit-text-stroke: 1.5px rgba(77,163,255,.07);
    transform: rotate(-9deg) translateY(-2%); white-space: nowrap; user-select:none;
  }

  .particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
  .particle { position: absolute; width: 2px; height: 2px; background: var(--blue-light); border-radius: 50%; opacity: 0; animation: drift var(--d,8s) var(--delay,0s) infinite ease-in-out; }
  .particle.ember { background: var(--ember); }
  @keyframes drift { 0%{transform:translateY(0) scale(1);opacity:0} 20%{opacity:.6} 80%{opacity:.3} 100%{transform:translateY(-120vh) scale(.4);opacity:0} }

  /* ══ HOME ══ */
  #home { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:40px 20px; position:relative; }
  .home-logo { width:160px; height:160px; object-fit:contain; filter:drop-shadow(0 0 30px rgba(77,163,255,.7)) drop-shadow(0 0 60px rgba(30,106,255,.4)); animation:pulse-logo 3s ease-in-out infinite; margin-bottom:28px; }
  @keyframes pulse-logo { 0%,100%{filter:drop-shadow(0 0 25px rgba(77,163,255,.6)) drop-shadow(0 0 50px rgba(30,106,255,.3))} 50%{filter:drop-shadow(0 0 45px rgba(77,163,255,.9)) drop-shadow(0 0 80px rgba(30,106,255,.5))} }
  .home-title { font-family:'Rajdhani',sans-serif; font-size:clamp(52px,10vw,96px); font-weight:700; letter-spacing:10px; line-height:1; background:linear-gradient(135deg,#fff 0%,var(--blue-pale) 35%,var(--cyan) 75%,var(--ember) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:12px; animation:flicker 6s ease-in-out infinite; }
  @keyframes flicker { 0%,95%,100%{opacity:1} 96%{opacity:.85} 97%{opacity:1} 98%{opacity:.9} }
  .home-sub { font-size:14px; letter-spacing:3px; color:var(--text-dim); margin-bottom:56px; text-transform:uppercase; }
  .home-btns { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
  .btn-home { position:relative; padding:16px 44px; font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; letter-spacing:3px; color:#fff; background:transparent; border:2px solid var(--blue-light); border-radius:50px; cursor:pointer; overflow:hidden; transition:.3s; text-transform:uppercase; clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px); }
  .btn-home::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(30,106,255,.3),rgba(0,229,255,.15)); opacity:0; transition:.3s; }
  .btn-home:hover::before { opacity:1; }
  .btn-home:hover { border-color:var(--cyan); box-shadow:0 0 30px rgba(77,163,255,.5),0 0 60px rgba(30,106,255,.25); transform:translateY(-2px); }
  .btn-home span { position:relative; z-index:1; }
  .btn-library { border-color:rgba(160,120,255,.6); }
  .btn-library::before { background:linear-gradient(135deg,rgba(120,60,255,.25),rgba(180,100,255,.1)); }
  .btn-library:hover { border-color:#c084fc; box-shadow:0 0 30px rgba(160,100,255,.4),0 0 60px rgba(120,60,255,.2); }
  .corner { position:absolute; width:80px; height:80px; border-color:rgba(255,61,26,.4); border-style:solid; }
  .corner-tl{top:30px;left:30px;border-width:3px 0 0 3px;clip-path:polygon(0 0,100% 0,0 30%,0 100%,30% 0)}
  .corner-tr{top:30px;right:30px;border-width:3px 3px 0 0;clip-path:polygon(0 0,100% 0,100% 100%,70% 0,100% 30%)}
  .corner-bl{bottom:30px;left:30px;border-width:0 0 3px 3px;clip-path:polygon(0 0,0 100%,100% 100%,0 70%,30% 100%)}
  .corner-br{bottom:30px;right:30px;border-width:0 3px 3px 0;clip-path:polygon(100% 100%,0 100%,100% 0,100% 70%,70% 100%)}

  /* ══ LIST ══ */
  #list { display:none; min-height:100vh; padding:40px 20px 100px; }
  .container { max-width:1300px; margin:auto; }
  .list-header { display:flex; align-items:center; gap:20px; margin-bottom:40px; flex-wrap:wrap; }
  .back-btn { background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--blue-light); padding:10px 22px; border-radius:50px; cursor:pointer; font-family:'Poppins',sans-serif; font-size:14px; backdrop-filter:blur(10px); transition:.3s; }
  .back-btn:hover { border-color:var(--blue-light); box-shadow:0 0 15px rgba(77,163,255,.3); }
  .list-title { font-family:'Rajdhani',sans-serif; font-size:clamp(32px,6vw,60px); font-weight:700; letter-spacing:6px; background:linear-gradient(135deg,#fff 0%,var(--blue-pale) 60%,var(--cyan) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

  .rank-legend { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-bottom:36px; }
  .legend-chip { display:flex; align-items:center; gap:9px; background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:50px; padding:9px 18px 9px 14px; backdrop-filter:blur(10px); font-size:13px; letter-spacing:1px; text-transform:uppercase; font-weight:600; color:var(--text-dim); transition:.3s; }
  .legend-chip:hover { transform:translateY(-2px); }
  .legend-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .legend-chip.lc-founder .legend-dot { background:var(--founder-col); box-shadow:0 0 8px var(--founder-col); }
  .legend-chip.lc-founder:hover { border-color:rgba(255,45,85,.5); color:var(--founder-col); }
  .legend-chip.lc-leader .legend-dot { background:var(--leader-col); box-shadow:0 0 8px var(--leader-col); }
  .legend-chip.lc-leader:hover { border-color:rgba(168,85,247,.5); color:var(--leader-col); }
  .legend-chip.lc-pro .legend-dot { background:var(--pro-col); box-shadow:0 0 8px var(--pro-col); }
  .legend-chip.lc-pro:hover { border-color:rgba(255,215,0,.5); color:var(--pro-col); }
  .legend-chip.lc-member .legend-dot { background:var(--member-col); box-shadow:0 0 8px var(--member-col); }
  .legend-chip.lc-member:hover { border-color:rgba(56,189,248,.5); color:var(--member-col); }

  .search { width:100%; max-width:500px; margin:0 auto 40px; position:relative; }
  .search input { width:100%; padding:14px 20px 14px 48px; border:1px solid var(--glass-border); border-radius:50px; background:var(--glass-bg); color:#fff; font-size:15px; backdrop-filter:blur(10px); outline:none; transition:.3s; font-family:'Poppins',sans-serif; }
  .search input::placeholder{color:var(--text-dim)}
  .search input:focus { border-color:var(--blue-light); box-shadow:0 0 20px rgba(77,163,255,.25); }
  .search-icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:16px; pointer-events:none; }

  .section { margin-top:48px; }
  .section-title { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid var(--glass-border); display:flex; align-items:center; gap:10px; }
  .title-founder{color:var(--founder-col);text-shadow:0 0 12px rgba(255,45,85,.5)}
  .title-leader{color:var(--leader-col);text-shadow:0 0 12px rgba(168,85,247,.45)}
  .title-pro{color:var(--pro-col);text-shadow:0 0 12px rgba(255,215,0,.5)}
  .title-member{color:var(--member-col);text-shadow:0 0 12px rgba(56,189,248,.4)}

  /* ── CARD ── */
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px; }
  .card { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:18px; padding:20px; backdrop-filter:blur(12px); transition:.35s; position:relative; overflow:hidden; display:flex; flex-direction:column; }
  .card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(77,163,255,.08),transparent); opacity:0; transition:.35s; }
  .card:hover { transform:translateY(-6px) scale(1.02); border-color:var(--blue-light); box-shadow:0 0 28px rgba(77,163,255,.4),0 8px 32px rgba(0,0,0,.4); }
  .card:hover::before{opacity:1}
  .card-pro { border-color:rgba(255,215,0,.35); }
  .card-pro:hover { border-color:var(--gold); box-shadow:0 0 28px rgba(255,215,0,.4),0 8px 32px rgba(0,0,0,.4); }
  .card-founder { border-color:rgba(255,45,85,.3); }
  .card-founder:hover { border-color:var(--founder-col); box-shadow:0 0 28px rgba(255,45,85,.35),0 8px 32px rgba(0,0,0,.4); }
  .card-leader { border-color:rgba(168,85,247,.3); }
  .card-leader:hover { border-color:var(--leader-col); box-shadow:0 0 28px rgba(168,85,247,.35),0 8px 32px rgba(0,0,0,.4); }

  /* avatar row */
  .card-top { display:flex; align-items:center; gap:14px; margin-bottom:12px; position:relative; z-index:1; }
  .avatar-wrap { position:relative; flex-shrink:0; }
  .avatar { width:56px; height:56px; border-radius:50%; object-fit:cover; border:2px solid var(--glass-border); background:rgba(77,163,255,.1); display:block; }
  .avatar-placeholder { width:56px; height:56px; border-radius:50%; border:2px dashed var(--glass-border); background:rgba(77,163,255,.07); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .avatar-upload-btn { position:absolute; bottom:-2px; right:-2px; width:20px; height:20px; border-radius:50%; background:rgba(30,106,255,.85); border:none; color:#fff; font-size:11px; cursor:pointer; align-items:center; justify-content:center; transition:.2s; display:none; }
  .avatar-upload-btn:hover { background:var(--blue-light); transform:scale(1.15); }
  body.edit-unlocked .avatar-upload-btn { display:flex; }
  .avatar-file-input { display:none; }
  .card-info { flex:1; min-width:0; }
  .role { font-size:11px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
  .name { font-family:'Rajdhani',sans-serif; font-size:24px; font-weight:700; margin-top:2px; }
  .name-founder{color:var(--founder-col);text-shadow:0 0 10px rgba(255,45,85,.45)}
  .name-leader{color:var(--leader-col);text-shadow:0 0 10px rgba(168,85,247,.4)}
  .name-pro{color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.6)}
  .name-member{color:var(--member-col)}

  /* fb button */
  .fb-btn { display:inline-flex; align-items:center; gap:6px; margin-top:auto; padding:7px 14px; background:rgba(24,119,242,.18); border:1px solid rgba(24,119,242,.5); border-radius:20px; color:#7ab8ff; font-size:12px; font-family:'Poppins',sans-serif; cursor:pointer; text-decoration:none; transition:.25s; width:fit-content; position:relative; z-index:1; }
  .fb-btn:hover { background:rgba(24,119,242,.35); border-color:#4da3ff; color:#fff; box-shadow:0 0 12px rgba(24,119,242,.4); }
  .fb-btn svg { width:14px; height:14px; flex-shrink:0; }

  /* ── MEMBER grid ── */
  .member-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; }
  .member { background:var(--glass-bg); border:1px solid var(--glass-border); padding:12px 14px; border-radius:12px; backdrop-filter:blur(8px); transition:.3s; display:flex; align-items:center; gap:12px; }
  .member:hover { border-color:rgba(255,255,255,.3); box-shadow:0 0 14px rgba(255,255,255,.08); transform:translateY(-2px); }
  .member-avatar { width:42px; height:42px; border-radius:50%; object-fit:cover; border:2px solid var(--glass-border); background:rgba(77,163,255,.1); flex-shrink:0; }
  .member-avatar-ph { width:42px; height:42px; border-radius:50%; border:2px dashed rgba(255,255,255,.2); background:rgba(255,255,255,.04); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .member-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:4px; }
  .member-name { color:var(--member-col); font-weight:600; font-size:14px; }
  .member-avatar-wrap { position:relative; flex-shrink:0; }
  .member-upload-btn { position:absolute; bottom:-2px; right:-2px; width:18px; height:18px; border-radius:50%; background:rgba(30,106,255,.85); border:none; color:#fff; font-size:10px; cursor:pointer; align-items:center; justify-content:center; transition:.2s; display:none; }
  .member-upload-btn:hover { background:var(--blue-light); }
  body.edit-unlocked .member-upload-btn { display:flex; }

  footer { text-align:center; margin-top:60px; font-size:13px; color:var(--text-dim); letter-spacing:2px; }

  /* ══ LIBRARY ══ */
  #library-overlay { display:none; position:fixed; inset:0; z-index:500; background:rgba(1,6,20,.92); backdrop-filter:blur(16px); flex-direction:column; align-items:center; padding:0 20px 80px; overflow-y:auto; }
  .lib-header { position:sticky; top:0; z-index:10; width:100%; max-width:900px; display:flex; align-items:center; gap:16px; padding:24px 0 16px; background:linear-gradient(to bottom,rgba(1,6,20,.98) 80%,transparent); }
  .lib-title { font-family:'Rajdhani',sans-serif; font-size:32px; font-weight:700; letter-spacing:4px; color:#c084fc; text-shadow:0 0 16px rgba(192,132,252,.5); flex:1; }
  .lib-close { background:rgba(192,132,252,.15); border:1px solid rgba(192,132,252,.4); color:#c084fc; width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:.25s; }
  .lib-close:hover { background:rgba(192,132,252,.3); box-shadow:0 0 12px rgba(192,132,252,.4); }
  .lib-upload-area { width:100%; max-width:900px; border:2px dashed rgba(192,132,252,.4); border-radius:20px; padding:36px; text-align:center; cursor:pointer; transition:.3s; margin-bottom:28px; background:rgba(120,60,255,.06); }
  .lib-upload-area:hover,.lib-upload-area.dragover { border-color:#c084fc; background:rgba(192,132,252,.1); box-shadow:0 0 24px rgba(192,132,252,.2); }
  .lib-upload-area input{display:none}
  .lib-upload-icon{font-size:48px;margin-bottom:12px}
  .lib-upload-text{font-size:15px;color:rgba(192,132,252,.8)}
  .lib-upload-sub{font-size:12px;color:var(--text-dim);margin-top:6px}
  .lib-grid { width:100%; max-width:900px; display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; }
  .lib-item { position:relative; border-radius:14px; overflow:hidden; border:1px solid rgba(192,132,252,.25); background:rgba(10,5,30,.6); aspect-ratio:1; transition:.3s; cursor:pointer; }
  .lib-item:hover { border-color:#c084fc; box-shadow:0 0 18px rgba(192,132,252,.35); transform:scale(1.03); }
  .lib-item img { width:100%; height:100%; object-fit:cover; display:block; }
  .lib-item-del { position:absolute; top:6px; right:6px; background:rgba(0,0,0,.7); border:none; color:#ff6b6b; width:26px; height:26px; border-radius:50%; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; opacity:0; transition:.2s; }
  .lib-item:hover .lib-item-del{opacity:1}
  .lib-empty { color:var(--text-dim); font-size:14px; text-align:center; padding:40px 0; width:100%; max-width:900px; }

  #lightbox { display:none; position:fixed; inset:0; z-index:600; background:rgba(0,0,0,.92); align-items:center; justify-content:center; cursor:zoom-out; }
  #lightbox img { max-width:90vw; max-height:90vh; border-radius:12px; box-shadow:0 0 40px rgba(192,132,252,.3); }
  #lightbox-close { position:fixed; top:20px; right:24px; background:none; border:none; color:#fff; font-size:32px; cursor:pointer; z-index:601; }

  .music-player { position:fixed; right:20px; bottom:20px; background:rgba(5,15,40,.9); border:1px solid var(--blue-light); padding:12px 18px; border-radius:50px; backdrop-filter:blur(16px); display:flex; gap:12px; align-items:center; z-index:999; box-shadow:0 0 20px rgba(77,163,255,.3); }
  .music-player button { background:var(--blue-glow); border:none; color:#fff; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:.2s; flex-shrink:0; }
  .music-player button:hover{background:var(--blue-light);box-shadow:0 0 10px rgba(77,163,255,.5)}
  .music-player input[type=range]{-webkit-appearance:none;width:80px;height:4px;border-radius:2px;background:rgba(77,163,255,.3);outline:none;cursor:pointer}
  .music-player input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--blue-light);cursor:pointer}
  .music-label{font-size:11px;letter-spacing:1.5px;color:var(--blue-pale);font-family:'Rajdhani',sans-serif;font-weight:600}

  .fade-in{animation:fadeIn .5s ease forwards}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="watermark"><span>EGOIST 380</span></div>
<div class="claw-marks"></div>
<div class="particles" id="particles"></div>

<!-- HOME -->
<div id="home">
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>
  <img alt="EGOIST 380 Logo" class="home-logo" src="logo.png"/>
  <h1 class="home-title">EGOIST 380</h1>
  <p class="home-sub">รับจ้างยิงคนทั่วอนาจักร</p>
  <div class="home-btns">
    <button class="btn-home" onclick="showList()"><span>LIST NAME</span></button>
    <button class="btn-home btn-library" onclick="showLibrary()"><span>📷 LIBRARY</span></button>
  </div>
</div>

<!-- LIST -->
<div id="list">
  <div class="container">
    <div class="list-header">
      <button class="back-btn" onclick="showHome()">← กลับหน้าแรก</button>
      <div class="list-title">EGOIST 380</div>
    </div>
    <div class="rank-legend">
      <div class="legend-chip lc-founder"><span class="legend-dot"></span>Founder</div>
      <div class="legend-chip lc-leader"><span class="legend-dot"></span>Leader</div>
      <div class="legend-chip lc-pro"><span class="legend-dot"></span>มือปราบเซียน</div>
      <div class="legend-chip lc-member"><span class="legend-dot"></span>Member</div>
    </div>
    <div class="search">
      <span class="search-icon">🔍</span>
      <input id="search" placeholder="ค้นหาสมาชิก..." type="text"/>
    </div>

    <div class="section">
      <div class="section-title title-founder">👑 FOUNDERS</div>
      <div class="cards" id="cards-founders"></div>
    </div>
    <div class="section">
      <div class="section-title title-leader">⭐ LEADERS</div>
      <div class="cards" id="cards-leaders"></div>
    </div>
    <div class="section">
      <div class="section-title title-pro">⚔️ มือปราบเซียน</div>
      <div class="cards" id="cards-pro"></div>
    </div>
    <div class="section">
      <div class="section-title title-member">👥 MEMBERS</div>
      <div class="member-grid" id="members-grid"></div>
    </div>

// Try to bring Firebase up. If the SDK failed to load (network hiccup, ad
// blocker, offline, etc.) or init throws for any reason, fall back to
// localStorage so the page still works for this visitor — it just won't
// sync with everyone else until Firebase is reachable again.
const COLLECTION = 'eg380_data'; // เก็บทุก key ไว้ใน collection นี้ (1 document ต่อ key)
let db = null;
let firebaseReady = false;
try{
  if(typeof firebase === 'undefined') throw new Error('Firebase SDK script did not load');
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  firebaseReady = true;
}catch(err){
  console.warn('Firebase unavailable — falling back to localStorage (no cross-device sync):', err);
}
function encodeKey(key){ return encodeURIComponent(key); }

// ── Storage engine ── Firestore when available, localStorage fallback otherwise.
// Same get/set/delete/list shape either way, so nothing else needs to know which is active.
const safeStorage = {
  async get(key){
    if(firebaseReady){
      const doc = await db.collection(COLLECTION).doc(encodeKey(key)).get();
      if(!doc.exists) return null;
      return { value: doc.data().value };
    }
    const v = localStorage.getItem(key);
    return v === null ? null : { value: v };
  },
  async set(key, value){
    if(firebaseReady){
      await db.collection(COLLECTION).doc(encodeKey(key)).set({ value, key, updatedAt: Date.now() });
      return { value };
    }
    localStorage.setItem(key, value);
    return { value };
  },
  async delete(key){
    if(firebaseReady){
      await db.collection(COLLECTION).doc(encodeKey(key)).delete();
      return { deleted: true };
    }
    localStorage.removeItem(key);
    return { deleted: true };
  },
  async list(prefix){
    if(firebaseReady){
      const snap = await db.collection(COLLECTION)
        .where('key', '>=', prefix)
        .where('key', '<', prefix + '\uf8ff')
        .get();
      return { keys: snap.docs.map(d => d.data().key) };
    }
    const keys = Object.keys(localStorage).filter(k=>k.startsWith(prefix));
    return { keys };
  }
};

}

// ── Resize image before storing (keeps it well under the 5MB/key limit + loads fast) ──
function resizeImage(file, maxSize){
  // Firestore caps each document at ~1MB, and base64 adds ~33% overhead,
  // so we keep the encoded result comfortably under ~700KB by stepping
  // down quality/size if needed.
  const MAX_ENCODED_BYTES = 700 * 1024;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let { width, height } = img;
        if(width > height){
          if(width > maxSize){ height *= maxSize/width; width = maxSize; }
        } else {
          if(height > maxSize){ width *= maxSize/height; height = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);

        let quality = 0.82;
        let result = canvas.toDataURL('image/jpeg', quality);
        let attempts = 0;
        while(result.length > MAX_ENCODED_BYTES && attempts < 6){
          quality -= 0.12;
          if(quality < 0.35){
            // quality floor reached — shrink dimensions instead
            width *= 0.8; height *= 0.8;
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            quality = 0.6;
          }
          result = canvas.toDataURL('image/jpeg', quality);
          attempts++;
        }
        resolve(result);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── Build CARD (founders/leaders/pros) ──
function buildCard(m, nameClass, tier){
  const av = getAvatar(m.key);
  const avatarHtml = av
    ? `<img class="avatar" src="${av}" alt="${m.name}" id="av_${m.key}"/>`
    : `<div class="avatar-placeholder" id="av_${m.key}">👤</div>`;
  const tierBorderClass = { founder:' card-founder', leader:' card-leader', pro:' card-pro' }[tier] || '';
  const tierFbColor = { founder:'#ff2d55', leader:'#a855f7', pro:'#ffd700' }[tier] || '#7ab8ff';
  const tierFbStyle = { founder:'border-color:rgba(255,45,85,.5);color:#ff2d55;', leader:'border-color:rgba(168,85,247,.5);color:#a855f7;', pro:'border-color:rgba(255,215,0,.5);color:#ffd700;' }[tier] || '';
  const fbHtml = m.fb
    ? `<a class="fb-btn" href="${m.fb}" target="_blank" rel="noopener" style="${tierFbStyle}">${fbSVG(tierFbColor)} Facebook</a>`
    : `<a class="fb-btn" href="#" style="opacity:.45;pointer-events:none;${tierFbStyle}">${fbSVG(tierFbColor)} Facebook</a>`;

  return `
    <div class="card${tierBorderClass}">
      <div class="card-top">
        <div class="avatar-wrap">
          ${avatarHtml}
          <button class="avatar-upload-btn" title="เปลี่ยนรูปโปรไฟล์" onclick="triggerAvatarUpload('${m.key}')">✏️</button>
          <input type="file" accept="image/*" class="avatar-file-input" id="avinput_${m.key}" onchange="handleAvatarUpload('${m.key}', this)"/>
        </div>
        <div class="card-info">
          ${m.role ? `<div class="role">${m.role}</div>` : ''}
          <div class="name ${nameClass}">${m.name}</div>
        </div>
      </div>
      ${fbHtml}
    </div>`;
}

function triggerAvatarUpload(key){
  document.getElementById('avinput_'+key).click();
}
async function handleAvatarUpload(key, input){
  if(!input.files[0]) return;
  const file = input.files[0];
  const el = document.getElementById('av_'+key);
  const originalHTML = el ? el.outerHTML : null;
  try{
    // show a quick "uploading" placeholder so it doesn't look frozen on slow connections
    if(el){ el.style.opacity = '0.5'; }
    const resized = await resizeImage(file, 400);
    await setAvatar(key, resized);
    const freshEl = document.getElementById('av_'+key);
    if(freshEl){
      const img = document.createElement('img');
      img.src = resized;
      img.alt = key;
      img.id = 'av_'+key;
      img.className = freshEl.classList.contains('member-avatar-ph') ? 'member-avatar' : 'avatar';
      freshEl.replaceWith(img);
    }
  }catch(err){
    console.error('Avatar upload failed:', err);
    alert('อัปโหลดรูปไม่สำเร็จ ลองใหม่อีกครั้ง ❌');
    if(el) el.style.opacity = '1';
  }finally{
    input.value = '';
  }
}

// ── Library (shared across everyone via Firestore) ──
let images = []; // array of {id, src}
let libLoaded = false;

async function loadLibrary(){
  try{
    const list = await safeStorage.list('libimg:');
    if(!list || !list.keys || list.keys.length === 0){ images = []; return; }
    const results = await Promise.all(list.keys.map(async key=>{
      try{
        const res = await safeStorage.get(key);
        return res ? { id: key, src: res.value } : null;
      }catch(err){ return null; }
    }));
    images = results.filter(Boolean);
    // newest first - ids are libimg:<timestamp>:<rand>
    images.sort((a,b)=> b.id.localeCompare(a.id));
  }catch(err){
    console.error('Load library failed:', err);
    images = [];
  }
}

function renderLib(){
  const grid=document.getElementById('libGrid');
  const empty=document.getElementById('libEmpty');
  grid.innerHTML='';
  if(images.length===0){empty.style.display='block';return;}
  empty.style.display='none';
  images.forEach((item)=>{
    const div=document.createElement('div');
    div.className='lib-item';
    div.innerHTML=`<img src="${item.src}" alt="img" loading="lazy"/><button class="lib-item-del">✕</button>`;
    div.querySelector('img').onclick=()=>openLightbox(item.src);
    div.querySelector('.lib-item-del').onclick=async e=>{
      e.stopPropagation();
      div.style.opacity='0.4';
      try{
        await safeStorage.delete(item.id);
        images = images.filter(im=>im.id!==item.id);
        renderLib();
      }catch(err){
        console.error('Delete image failed:', err);
        alert('ลบรูปไม่สำเร็จ ❌');
        div.style.opacity='1';
      }
    };
    grid.appendChild(div);
  });
}
const uploadArea=document.getElementById('uploadArea');
const fileInput=document.getElementById('fileInput');
uploadArea.onclick=()=>fileInput.click();
uploadArea.ondragover=e=>{e.preventDefault();uploadArea.classList.add('dragover')};
uploadArea.ondragleave=()=>uploadArea.classList.remove('dragover');
uploadArea.ondrop=e=>{e.preventDefault();uploadArea.classList.remove('dragover');handleLibFiles(e.dataTransfer.files)};
fileInput.onchange=()=>{handleLibFiles(fileInput.files); fileInput.value='';};
async function handleLibFiles(files){
  const imgFiles = Array.from(files).filter(f=>f.type.startsWith('image/'));
  for(const f of imgFiles){
    try{
      const resized = await resizeImage(f, 1000);
      const id = 'libimg:' + Date.now() + ':' + Math.random().toString(36).slice(2,8);
      await safeStorage.set(id, resized);
      images.unshift({ id, src: resized });
      renderLib();
    }catch(err){
      console.error('Upload library image failed:', err);
      alert('อัปโหลดรูปไม่สำเร็จ ❌');
    }
  }
}
function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').style.display='flex';}
